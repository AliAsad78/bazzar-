<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — Bazaar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script type="module" src="firebase-config.js"></script>
<script type="module" src="auth.js"></script>
<style>
  :root {
    --orange: #FF5722; --orange-light: #FF7043; --orange-dark: #E64A19;
    --teal: #00897B; --navy: #0D1B2A; --navy-mid: #1A2E42;
    --gray-bg: #F5F5F2; --gray-light: #EBEBEB; --gray-mid: #B0B0A8;
    --text: #1A1A1A; --text-muted: #666660; --white: #FFFFFF;
    --card-radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--gray-bg); color:var(--text); min-height:100vh; }

  /* HEADER */
  header {
    background:white; border-bottom:1.5px solid var(--gray-light);
    position:sticky; top:0; z-index:100;
    box-shadow:0 2px 12px rgba(0,0,0,0.06);
  }
  .header-inner {
    max-width:900px; margin:0 auto; padding:14px 24px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .logo {
    font-family:'Syne',sans-serif; font-weight:800; font-size:24px;
    color:var(--orange); text-decoration:none; letter-spacing:-1px;
  }
  .logo span { color:var(--navy); }
  .back-link {
    font-size:14px; color:var(--text-muted); text-decoration:none;
    display:flex; align-items:center; gap:6px;
  }
  .back-link:hover { color:var(--orange); }

  /* PAGE */
  .page { max-width:900px; margin:0 auto; padding:32px 24px; }

  /* LOADING STATE */
  #loadingState {
    text-align:center; padding:80px 20px;
    font-size:16px; color:var(--text-muted);
  }

  /* PROFILE CARD */
  .profile-card {
    background:white; border-radius:16px;
    box-shadow:0 2px 16px rgba(0,0,0,0.06); overflow:hidden;
    display:none;
  }
  .profile-header {
    background:linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
    padding:32px; display:flex; align-items:center; gap:20px;
  }
  .profile-avatar-big {
    width:72px; height:72px; border-radius:50%;
    background:var(--orange); color:white;
    font-family:'Syne',sans-serif; font-weight:800; font-size:26px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; border:3px solid rgba(255,255,255,0.3);
  }
  .profile-meta h1 { font-family:'Syne',sans-serif; font-weight:700; font-size:22px; color:white; }
  .profile-meta p  { color:rgba(255,255,255,0.6); font-size:14px; margin-top:4px; }
  .role-badge {
    display:inline-block; padding:3px 12px; border-radius:20px;
    font-size:12px; font-weight:600; margin-top:8px;
  }
  .role-badge.seller { background:var(--orange); color:white; }
  .role-badge.buyer  { background:var(--teal);   color:white; }

  /* TABS */
  .profile-tabs {
    display:flex; border-bottom:2px solid var(--gray-light); padding:0 32px;
    background:white;
  }
  .ptab {
    padding:14px 20px; border:none; background:none; cursor:pointer;
    font-family:'Syne',sans-serif; font-weight:700; font-size:14px;
    color:var(--text-muted); border-bottom:2px solid transparent; margin-bottom:-2px;
    transition:color 0.2s;
  }
  .ptab.active { color:var(--orange); border-bottom-color:var(--orange); }

  /* FORM SECTION */
  .profile-section { padding:32px; display:none; }
  .profile-section.active { display:block; }

  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  .form-group { display:flex; flex-direction:column; gap:6px; }
  .form-group.full { grid-column:1/-1; }
  .form-label {
    font-size:13px; font-weight:600; color:var(--text-muted);
    text-transform:uppercase; letter-spacing:0.5px;
  }
  .form-input, .form-textarea {
    padding:11px 14px; border:1.5px solid var(--gray-light); border-radius:8px;
    font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text);
    outline:none; transition:border-color 0.2s; background:var(--gray-bg);
  }
  .form-input:focus, .form-textarea:focus { border-color:var(--orange); background:white; }
  .form-input[readonly] { opacity:0.6; cursor:not-allowed; }
  .form-textarea { resize:vertical; min-height:80px; }

  .save-row { margin-top:24px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .save-btn {
    background:var(--orange); color:white; border:none;
    padding:12px 32px; border-radius:8px;
    font-family:'Syne',sans-serif; font-weight:700; font-size:15px;
    cursor:pointer; transition:background 0.2s;
  }
  .save-btn:hover { background:var(--orange-dark); }
  .save-btn:disabled { opacity:0.6; cursor:not-allowed; }
  .profile-ok    { color:#38a169; font-size:14px; font-weight:500; }
  .profile-error { color:#e53e3e; font-size:14px; }

  /* PASSWORD SECTION */
  .danger-zone {
    background:#fff5f5; border:1.5px solid #fed7d7; border-radius:10px;
    padding:20px; margin-top:24px;
  }
  .danger-zone h3 { font-family:'Syne',sans-serif; font-size:15px; color:#c53030; margin-bottom:8px; }

  /* ACCOUNT INFO */
  .info-row {
    display:flex; justify-content:space-between; align-items:center;
    padding:14px 0; border-bottom:1px solid var(--gray-light);
  }
  .info-row:last-child { border-bottom:none; }
  .info-label { font-size:13px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.4px; }
  .info-value { font-size:14px; color:var(--text); font-weight:500; }

  /* SIGN OUT BUTTON */
  .signout-btn {
    display:inline-flex; align-items:center; gap:8px;
    padding:11px 24px; border-radius:8px;
    border:1.5px solid var(--gray-light); background:white;
    font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500;
    color:var(--text-muted); cursor:pointer; transition:all 0.2s;
    text-decoration:none; margin-top:24px;
  }
  .signout-btn:hover { border-color:#e53e3e; color:#e53e3e; }

  @media(max-width:600px) {
    .page { padding:16px; }
    .form-grid { grid-template-columns:1fr; }
    .profile-header { flex-direction:column; text-align:center; }
    .profile-tabs { padding:0 16px; overflow-x:auto; }
    .profile-section { padding:20px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo">bazar<span>.</span></a>
    <a href="index.html" class="back-link">← Back to Marketplace</a>
  </div>
</header>

<div class="page">

  <!-- Loading -->
  <div id="loadingState">⏳ Loading your profile...</div>

  <!-- Not logged in -->
  <div id="notLoggedIn" style="display:none;text-align:center;padding:80px 20px">
    <div style="font-size:48px;margin-bottom:16px">🔒</div>
    <h2 style="font-family:'Syne',sans-serif;margin-bottom:8px">Sign in required</h2>
    <p style="color:var(--text-muted);margin-bottom:24px">Please sign in to view your profile.</p>
    <a href="index.html" style="background:var(--orange);color:white;padding:12px 32px;border-radius:8px;text-decoration:none;font-family:'Syne',sans-serif;font-weight:700">Go to Sign In</a>
  </div>

  <!-- Profile Card -->
  <div class="profile-card" id="profileCard">
    <div class="profile-header">
      <div class="profile-avatar-big" id="profileAvatar">--</div>
      <div class="profile-meta">
        <h1 id="profileHeaderName">...</h1>
        <p id="profileHeaderEmail">...</p>
        <span class="role-badge" id="profileRoleBadge">buyer</span>
      </div>
    </div>

    <div class="profile-tabs">
      <button class="ptab active" onclick="showPTab('edit')">✏️ Edit Profile</button>
      <button class="ptab"        onclick="showPTab('account')">⚙️ Account</button>
    </div>

    <!-- EDIT PROFILE -->
    <div class="profile-section active" id="ptab-edit">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Full Name *</label>
          <input class="form-input" id="prof-name" type="text" placeholder="Your full name">
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number *</label>
          <input class="form-input" id="prof-phone" type="tel" placeholder="0300-1234567">
        </div>
        <div class="form-group">
          <label class="form-label">City</label>
          <input class="form-input" id="prof-city" type="text" placeholder="e.g. Lahore, Karachi, Islamabad">
        </div>
        <div class="form-group" id="prof-shop-group" style="display:none">
          <label class="form-label">Shop / Business Name</label>
          <input class="form-input" id="prof-shop" type="text" placeholder="Your shop name">
        </div>
        <div class="form-group full">
          <label class="form-label">Bio / About</label>
          <textarea class="form-textarea" id="prof-bio" placeholder="Tell buyers a bit about yourself or your shop..."></textarea>
        </div>
      </div>
      <div class="save-row">
        <button class="save-btn" id="prof-save-btn" onclick="doUpdateProfile()">Save Changes</button>
        <span class="profile-ok"    id="profile-ok"></span>
        <span class="profile-error" id="profile-error"></span>
      </div>
    </div>

    <!-- ACCOUNT INFO -->
    <div class="profile-section" id="ptab-account">
      <div class="info-row">
        <span class="info-label">Email</span>
        <span class="info-value" id="acc-email">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Account Type</span>
        <span class="info-value" id="acc-role">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Member Since</span>
        <span class="info-value" id="acc-joined">—</span>
      </div>
      <div id="seller-dashboard-link" style="display:none;margin-top:20px">
        <a href="bazaar-seller.html" style="background:var(--navy);color:white;padding:12px 24px;border-radius:8px;text-decoration:none;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;display:inline-block">
          🏪 Go to Seller Dashboard →
        </a>
      </div>
      <div>
        <button class="signout-btn" onclick="doLogout()">🚪 Sign Out</button>
      </div>
    </div>
  </div>

</div>

<div class="notif" id="notif" style="
  position:fixed;bottom:24px;right:24px;
  background:var(--navy);color:white;padding:12px 20px;
  border-radius:10px;font-size:14px;font-weight:500;
  opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:500
"></div>

<script>
function showNotif(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg; n.style.opacity = '1';
  setTimeout(() => n.style.opacity = '0', 2800);
}
function showPTab(tab) {
  document.querySelectorAll('.profile-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
  document.getElementById('ptab-' + tab).classList.add('active');
  event.target.classList.add('active');
}
</script>

<script type="module">
  import { auth, db } from "./firebase-config.js";
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  onAuthStateChanged(auth, async (user) => {
    document.getElementById("loadingState").style.display = "none";
    if (!user) {
      document.getElementById("notLoggedIn").style.display = "block";
      return;
    }
    const snap = await getDoc(doc(db, "users", user.uid));
    if (!snap.exists()) {
      document.getElementById("notLoggedIn").style.display = "block";
      return;
    }
    const p = snap.data();
    window.currentUser    = user;
    window.currentProfile = p;

    // Fill header
    const initials = p.name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
    document.getElementById("profileAvatar").textContent      = initials;
    document.getElementById("profileHeaderName").textContent  = p.name;
    document.getElementById("profileHeaderEmail").textContent = p.email;
    const badge = document.getElementById("profileRoleBadge");
    badge.textContent = p.role === "seller" ? "🏪 Seller" : "🛍️ Buyer";
    badge.className = "role-badge " + p.role;

    // Fill form
    document.getElementById("prof-name").value  = p.name  || "";
    document.getElementById("prof-phone").value = p.phone || "";
    document.getElementById("prof-city").value  = p.city  || "";
    document.getElementById("prof-bio").value   = p.bio   || "";
    if (p.role === "seller") {
      document.getElementById("prof-shop-group").style.display = "block";
      document.getElementById("prof-shop").value = p.shopName || "";
    }

    // Account tab
    document.getElementById("acc-email").textContent  = p.email;
    document.getElementById("acc-role").textContent   = p.role === "seller" ? "Seller Account" : "Buyer Account";
    const joined = p.createdAt?.toDate ? p.createdAt.toDate().toLocaleDateString("en-PK", {year:"numeric",month:"long"}) : "—";
    document.getElementById("acc-joined").textContent = joined;
    if (p.role === "seller") document.getElementById("seller-dashboard-link").style.display = "block";

    document.getElementById("profileCard").style.display = "block";
  });
</script>
</body>
</html>
